# General
mixed-port: 7890
redir-port: 7892
external-ui: ./
log-level: info
allow-lan: true
bind-address: "*"
external-controller: 0.0.0.0:9090
secret: ""
#-------------------------------------------------------------#
# Profiles
mode: rule
ipv6: false
authentication: []
hosts: {}

