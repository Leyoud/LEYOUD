surge_ruleset=Domestic,[]GEOIP,CN

;其他网站
surge_ruleset=Others,[]MATCH

;rules End

;proxy-groups Start

;代理服务
custom_proxy_group=Proxy`select`[]Fallback`[]Auto`[]LoadBalance`[]HK`[]JP`[]US`[]TW`[]SG`[]KR`[]Debug`.*

;自动切换
custom_proxy_group=Auto`url-test`.*`http://www.gstatic.com/generate_204`300,,150

;故障转移
custom_proxy_group=Fallback`fallback`.*`http://www.gstatic.com/generate_204`300

;负载均衡
custom_proxy_group=LoadBalance`load-balance`.*`http://www.gstatic.com/generate_204`300

;链式代理
;custom_proxy_group=Relay`relay`[]DIRECT

;电报消息
custom_proxy_group=Telegram`select`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;油管视频
custom_proxy_group=YouTube`select`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;奈飞视频
custom_proxy_group=Netflix`select`[]NF`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;巴哈姆特
custom_proxy_group=Bahamut`select`[]TW`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]SG`[]KR

;Spotify音乐
custom_proxy_group=Spotify`select`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;国外媒体
custom_proxy_group=GlobalTV`select`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;国内媒体
custom_proxy_group=AsianTV`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;港澳台媒体
custom_proxy_group=HMTMedia`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;测速平台
custom_proxy_group=Speedtest`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;PayPal支付
custom_proxy_group=PayPal`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;微软服务
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;苹果服务
custom_proxy_group=Apple`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;谷歌FCM
custom_proxy_group=GoogleFCM`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;游戏平台
custom_proxy_group=ComputerGame`select`[]DIRECT`[]Proxy`[]Auto`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;网易音乐
custom_proxy_group=NeteaseMusic`select`[]DIRECT`(网易|音乐|解锁|Music|NetEase)`[]Proxy`[]Auto

;全球直连
custom_proxy_group=Domestic`select`[]DIRECT`[]Proxy`[]Auto

;全球拦截
custom_proxy_group=AdBlock`select`[]REJECT`[]DIRECT

;其他网站
custom_proxy_group=Others`select`[]Proxy`[]Auto`[]DIRECT`[]HK`[]JP`[]US`[]TW`[]SG`[]KR

;香港节点
custom_proxy_group=HK`fallback`(HK|HongKong|HKT|HKBN|HGC|WTT|CMI|[^-]港|港)`http://www.gstatic.com/generate_204`300

;日本节点
custom_proxy_group=JP`fallback`(日本|东京|大阪|埼玉|[^-]日|JP|Japan)`http://www.gstatic.com/generate_204`300

;美国节点
custom_proxy_group=US`fallback`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300

;台湾节点
custom_proxy_group=TW`fallback`(台|新北|彰化|TW|Taiwan)`http://www.gstatic.com/generate_204`300

;狮城节点
custom_proxy_group=SG`fallback`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300

;韩国节点
custom_proxy_group=KR`fallback`(KR|Korea|KOR|首尔|韩|韓)`http://www.gstatic.com/generate_204`300

;奈飞节点
custom_proxy_group=NF`fallback`(NF|奈飞|解锁|Netflix|NETFLIX|Media)`http://www.gstatic.com/generate_204`300

;proxy-groups End

enable_rule_generator=true
overwrite_original_rules=true

clash_rule_base=https://raw.githubusercontent.com/Leyoud/Rules/master/GeneralClashConfig.yaml

